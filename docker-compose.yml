services:
  angie:
    image: docker.angie.software/angie:minimal
    container_name: xray-angie
    restart: unless-stopped
    network_mode: host
    volumes:
      - angie-data:/var/lib/angie
      - ./angie.conf:/etc/angie/angie.conf:ro
      - ./mask:${APP_DIR:-/opt/xray_panel}/mask:ro
      - ./marzban_lib:/var/lib/marzban:ro

  marzban:
    image: ${MARZBAN_IMAGE:-gozargah/marzban:latest}
    container_name: xray-marzban
    restart: unless-stopped
    env_file: ./marzban/.env
    network_mode: host
    volumes:
      - ./marzban/xray_config.json:/code/xray_config.json:ro
      - ./xray-core:/var/lib/marzban/xray-core
      - ./marzban_lib:/var/lib/marzban

volumes:
  angie-data:
    driver: local
